<!DOCTYPE html>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080c12; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }
  input[type=range] { accent-color: #3b82f6; width: 100%; }
  input[type=number] { width: 100%; background: #0d1117; border: 1px solid #1e2a3a; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 15px; font-family: monospace; outline: none; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0d1117; } ::-webkit-scrollbar-thumb { background: #1e2a3a; border-radius: 3px; }
  .btn { border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
  .btn-primary:disabled { background: #1e2a3a; color: #4a6080; cursor: not-allowed; }
  .tab { background: transparent; color: #4a6080; border: none; border-bottom: 2px solid transparent; border-radius: 8px 8px 0 0; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .tab.active { background: #1e2a3a; color: #e2e8f0; border-bottom: 2px solid #3b82f6; }
  .signal-row { display: grid; grid-template-columns: 32px 70px 100px 1fr 95px 95px 95px 95px 65px; gap: 8px; align-items: center; padding: 10px 16px; border-bottom: 1px solid #0d1117; }
  .signal-row:nth-child(even) { background: #0a0f16; }
  .signal-row:nth-child(odd) { background: #080c12; }
  .signal-row:hover { background: #111827; }
  .col-header { display: grid; grid-template-columns: 32px 70px 100px 1fr 95px 95px 95px 95px 65px; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #1e2a3a; background: #0d1117; }
  .mono { font-family: 'SF Mono', 'Menlo', monospace; }
  @media (max-width: 768px) {
    .signal-row { grid-template-columns: 28px 55px 85px 1fr; }
    .signal-row .hide-mobile { display: none; }
    .col-header { grid-template-columns: 28px 55px 85px 1fr; }
    .col-header .hide-mobile { display: none; }
  }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const ACCOUNT_SIZE = 1000;
const BASE_RISK_PCT = 1.5;

const SECTORS = [
{ name: “Technology”, tickers: [“AAPL”,“MSFT”,“NVDA”,“AVGO”,“AMD”,“CRM”,“NOW”,“SNOW”,“NET”,“DDOG”] },
{ name: “Financials”, tickers: [“JPM”,“GS”,“MS”,“V”,“MA”,“PYPL”,“COIN”,“SQ”,“HOOD”,“AFRM”] },
{ name: “Energy”, tickers: [“XOM”,“CVX”,“OXY”,“DVN”,“MPC”,“VLO”,“HAL”,“SLB”,“BKR”,“FANG”] },
{ name: “Healthcare”, tickers: [“UNH”,“LLY”,“JNJ”,“ABBV”,“MRK”,“AMGN”,“ISRG”,“MRNA”,“TDOC”,“DXCM”] },
{ name: “Cybersecurity”, tickers: [“CRWD”,“PANW”,“FTNT”,“S”,“OKTA”,“ZS”,“TENB”,“SAIL”,“QLYS”,“CYBR”] },
{ name: “Software”, tickers: [“ADBE”,“ORCL”,“SHOP”,“HUBS”,“TWLO”,“BILL”,“GTLB”,“MDB”,“CFLT”,“NET”] },
{ name: “Semiconductors”, tickers: [“NVDA”,“AMD”,“AVGO”,“QCOM”,“MU”,“AMAT”,“LRCX”,“KLAC”,“SWKS”,“MRVL”] },
{ name: “Consumer Disc”, tickers: [“AMZN”,“TSLA”,“HD”,“MCD”,“NKE”,“LULU”,“DECK”,“ONON”,“CROX”,“RH”] },
];

function fmt(n, d=2) { return n==null||isNaN(n) ? “–” : Number(n).toFixed(d); }
function fmtPct(n) { if(n==null||isNaN(n)) return “–”; return (n>=0?”+”:””)+Number(n).toFixed(2)+”%”; }

function ema(closes, period) {
if(closes.length < period) return null;
const k = 2/(period+1);
let e = closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
for(let i=period;i<closes.length;i++) e = closes[i]*k + e*(1-k);
return e;
}

function rsi(closes, period=14) {
if(closes.length < period+1) return null;
let g=0,l=0;
for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1]; if(d>=0)g+=d; else l-=d;}
let ag=g/period, al=l/period;
for(let i=period+1;i<closes.length;i++){const d=closes[i]-closes[i-1]; ag=(ag*(period-1)+Math.max(d,0))/period; al=(al*(period-1)+Math.max(-d,0))/period;}
return al===0 ? 100 : 100-100/(1+ag/al);
}

function analyze(ticker, data) {
const closes = data.map(d=>d.c);
const highs = data.map(d=>d.h);
const lows = data.map(d=>d.l);
const vols = data.map(d=>d.v);
if(closes.length < 55) return null;

const price = closes[closes.length-1];
const prev = closes[closes.length-2];
const prevH = highs[highs.length-2];
const e9=ema(closes,9), e21=ema(closes,21), e50=ema(closes,50);
const stage2 = e9>e21 && e21>e50 && price>e50;
if(!stage2) return null;

const tags=[];
if(price>prevH) tags.push(“PDH”);
const h52=Math.max(…highs.slice(-252));
if(price>=h52*0.995) tags.push(“ATH”);
else if(price>=h52*0.97) tags.push(“nrATH”);

const ranges=closes.slice(-10).map((c,i,a)=>i===0?0:Math.abs(c-a[i-1]));
const rr=ranges.slice(-3).reduce((a,b)=>a+b,0)/3;
const pr=ranges.slice(0,7).reduce((a,b)=>a+b,0)/7;
if(rr<pr*0.6) tags.push(“VCP”);

const rl=Math.min(…lows.slice(-5)), pl=Math.min(…lows.slice(-15,-5));
if(rl<pl && price>pl) tags.push(“UC”);

if(Math.abs(price-e21)/e21<0.02 && price>e21) tags.push(“21e”);
if(Math.abs(price-e50)/e50<0.03 && price>e50) tags.push(“50e”);

const rs=(closes[closes.length-1]/closes[closes.length-20])-1;
if(rs>0.05) tags.push(“RS+”);

const wkH=Math.max(…highs.slice(-5)), pwkH=Math.max(…highs.slice(-10,-5));
if(wkH>pwkH) tags.push(“WK”);

const engines=tags.filter(t=>[“UC”,“VCP”,“21e”,“50e”,“WK”].includes(t));
const triggers=tags.filter(t=>[“PDH”,“GAP”].includes(t));
if(engines.length<1||triggers.length<1) return null;

const stopDist=Math.max(price*0.005, price-Math.min(…lows.slice(-5)));
const stop=price-stopDist;
const riskD=ACCOUNT_SIZE*(BASE_RISK_PCT/100);
let shares=Math.floor(riskD/stopDist);
const cap=ACCOUNT_SIZE*0.3;
if(shares*price>cap) shares=Math.floor(cap/price);

const adr=closes.slice(-20).reduce((s,c,i,a)=>i===0?0:s+Math.abs(c-a[i-1])/a[i-1]*100,0)/19;
if(adr>8) tags.push(”!ATR”);
if((stopDist/price)*100>5) tags.push(”!EXT”);

const avgVol=vols.slice(-20).reduce((a,b)=>a+b,0)/20;

return {
ticker, price, change:((price-prev)/prev)*100,
e9, e21, e50, tags,
alert:fmt(price), stop:fmt(stop),
t2r:fmt(price+stopDist*2), t5r:fmt(price+stopDist*5),
shares, risk:fmt(riskD), adr:fmt(adr),
score: engines.length*2+triggers.length+(rs>0.1?1:0)+(price>=h52*0.97?1:0)
};
}

async function fetchStock(ticker) {
const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y`;
const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
const res = await fetch(proxy);
const json = await res.json();
const r = JSON.parse(json.contents)?.chart?.result?.[0];
if(!r) return null;
const q=r.indicators.quote[0];
return r.timestamp.map((t,i)=>({c:q.close[i],h:q.high[i],l:q.low[i],o:q.open[i],v:q.volume[i]})).filter(d=>d.c!=null);
}

function Tag({label}) {
const colors={PDH:”#22c55e”,ATH:”#f59e0b”,nrATH:”#f59e0b”,VCP:”#3b82f6”,UC:”#8b5cf6”,“21e”:”#06b6d4”,“50e”:”#0ea5e9”,“RS+”:”#10b981”,WK:”#a855f7”,”!ATR”:”#ef4444”,”!EXT”:”#f97316”};
const c=colors[label]||”#334155”;
return <span style={{background:c+“22”,color:c,border:`1px solid ${c}44`,borderRadius:4,padding:“2px 6px”,fontSize:10,fontWeight:700,marginRight:3,whiteSpace:“nowrap”}}>{label}</span>;
}

function StatBox({label,value,color}) {
return (
<div style={{background:”#0d1117”,border:“1px solid #1e2a3a”,borderRadius:8,padding:“12px 16px”,flex:1,minWidth:100}}>
<div style={{fontSize:10,color:”#4a6080”,letterSpacing:2,textTransform:“uppercase”,marginBottom:6}}>{label}</div>
<div className=“mono” style={{fontSize:18,fontWeight:700,color:color||”#e2e8f0”}}>{value||”–”}</div>
</div>
);
}

function App() {
const [scanning,setScanning]=useState(false);
const [progress,setProgress]=useState({cur:0,tot:0,ticker:””});
const [signals,setSignals]=useState([]);
const [sectors,setSectors]=useState([]);
const [posture,setPosture]=useState(null);
const [spyPrice,setSpyPrice]=useState(null);
const [spyChg,setSpyChg]=useState(null);
const [lastScan,setLastScan]=useState(null);
const [tab,setTab]=useState(“signals”);
const [entry,setEntry]=useState(””);
const [stopP,setStopP]=useState(””);
const [riskPct,setRiskPct]=useState(BASE_RISK_PCT);
const [log,setLog]=useState(””);

const runScan = useCallback(async()=>{
setScanning(true); setSignals([]); setSectors([]); setLog(””);
try {
const spyData=await fetchStock(“SPY”);
if(spyData){
const cl=spyData.map(d=>d.c);
const e9=ema(cl,9),e21=ema(cl,21),e50=ema(cl,50),p=cl[cl.length-1];
setSpyPrice(p); setSpyChg(((p-cl[cl.length-2])/cl[cl.length-2])*100);
if(e9>e21&&e21>e50&&p>e50) setPosture(“BULLISH”);
else if(p<e50&&e9<e50) setPosture(“BEARISH”);
else setPosture(“CAUTION”);
}
const all=[…new Set(SECTORS.flatMap(s=>s.tickers))];
setProgress({cur:0,tot:all.length,ticker:””});
const sectorMap={};
const allSigs=[];
for(const sec of SECTORS){
let score=0,count=0;
for(const t of sec.tickers){
setProgress(p=>({…p,cur:p.cur+1,ticker:t}));
setLog(l=>l+`Scanning ${t}...\n`);
try{
const data=await fetchStock(t);
if(!data) continue;
const cl=data.map(d=>d.c);
const e9=ema(cl,9),e21=ema(cl,21),e50=ema(cl,50),p=cl[cl.length-1];
let sc=0;
if(p>e9)sc++; if(p>e21)sc++; if(p>e50)sc++; if(e9>e21)sc++;
score+=sc; count++;
const sig=analyze(t,data);
if(sig) allSigs.push({…sig,sector:sec.name});
}catch(e){}
await new Promise(r=>setTimeout(r,120));
}
sectorMap[sec.name]=count>0?score/count:0;
}
const sorted=Object.entries(sectorMap).map(([name,score])=>({name,score,status:score>=3?“HOT”:score>=2?“WARM”:“COLD”})).sort((a,b)=>b.score-a.score);
setSectors(sorted);
setSignals(allSigs.sort((a,b)=>b.score-a.score));
setLastScan(new Date());
}catch(e){ setLog(l=>l+“Error: “+e.message); }
finally{ setScanning(false); setProgress({cur:0,tot:0,ticker:””}); }
},[]);

const entryN=parseFloat(entry), stopN=parseFloat(stopP);
const riskD=ACCOUNT_SIZE*(riskPct/100);
const sd=entryN-stopN;
const sh=sd>0?Math.floor(riskD/sd):0;
const cost=sh*entryN, cap=ACCOUNT_SIZE*0.3;
const capped=cost>cap?Math.floor(cap/entryN):sh;
const postureColor=posture===“BULLISH”?”#22c55e”:posture===“BEARISH”?”#ef4444”:”#f59e0b”;

return (
<div style={{minHeight:“100vh”}}>
{/* Header */}
<div style={{background:“linear-gradient(135deg,#0d1117,#0a1628)”,borderBottom:“1px solid #1e2a3a”,padding:“14px 20px”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,position:“sticky”,top:0,zIndex:100}}>
<div style={{display:“flex”,alignItems:“center”,gap:10}}>
<div style={{width:34,height:34,borderRadius:8,background:“linear-gradient(135deg,#3b82f6,#8b5cf6)”,display:“flex”,alignItems:“center”,justifyContent:“center”,fontWeight:900,fontSize:16}}>I</div>
<div>
<div style={{fontSize:17,fontWeight:800}}>Iain’s Trading System</div>
<div style={{fontSize:11,color:”#4a6080”}}>{lastScan?`Last scan: ${lastScan.toLocaleTimeString()}`:“No scan yet”}</div>
</div>
</div>
<div style={{display:“flex”,alignItems:“center”,gap:10}}>
{scanning && <div style={{fontSize:11,color:”#4a6080”}}>{progress.ticker} ({progress.cur}/{progress.tot})</div>}
<button className="btn btn-primary" onClick={runScan} disabled={scanning}>
{scanning?“⏳ Scanning…”:“▶ Full Daily Scan”}
</button>
</div>
</div>

```
  {/* Stats */}
  <div style={{padding:"14px 20px",display:"flex",gap:10,flexWrap:"wrap"}}>
    <StatBox label="Posture" value={posture} color={postureColor}/>
    <StatBox label="SPY" value={spyPrice?`$${fmt(spyPrice)}`:null} color={spyChg>=0?"#22c55e":"#ef4444"}/>
    <StatBox label="SPY Chg" value={fmtPct(spyChg)} color={spyChg>=0?"#22c55e":"#ef4444"}/>
    <StatBox label="Signals" value={signals.length||"0"} color="#3b82f6"/>
    <StatBox label="Account" value="$1,000" color="#f59e0b"/>
    <StatBox label="Risk/Trade" value={`$${fmt(ACCOUNT_SIZE*BASE_RISK_PCT/100)}`} color="#8b5cf6"/>
  </div>

  {/* Tabs */}
  <div style={{padding:"0 20px",display:"flex",gap:4,borderBottom:"1px solid #1e2a3a"}}>
    {[["signals",`Signals (${signals.length})`],["sectors","Sectors"],["sizer","Sizer"]].map(([id,label])=>(
      <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{label}</button>
    ))}
  </div>

  {/* Signals Tab */}
  {tab==="signals" && (
    <div>
      {signals.length===0&&!scanning?(
        <div style={{textAlign:"center",padding:60,color:"#4a6080"}}>
          <div style={{fontSize:40,marginBottom:12}}>📡</div>
          <div style={{fontSize:16,fontWeight:600}}>No signals yet</div>
          <div style={{fontSize:13,marginTop:8}}>Click Full Daily Scan to start</div>
        </div>
      ):(
        <>
          <div className="col-header">
            {["#","Ticker","Price","Setup","Alert","Stop","2R","5R","Shares"].map((h,i)=>(
              <div key={h} className={i>3?"hide-mobile":""} style={{fontSize:10,color:"#4a6080",letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>{h}</div>
            ))}
          </div>
          {signals.map((s,i)=>(
            <div key={s.ticker} className="signal-row">
              <div className="mono" style={{color:"#4a6080",fontSize:12}}>{i+1}</div>
              <div className="mono" style={{fontWeight:800,color:"#f1f5f9",fontSize:13}}>{s.ticker}</div>
              <div className="mono" style={{color:s.change>=0?"#22c55e":"#ef4444",fontSize:12}}>${fmt(s.price)} <span style={{fontSize:10}}>{fmtPct(s.change)}</span></div>
              <div style={{display:"flex",flexWrap:"wrap",gap:2}}>{s.tags.map(t=><Tag key={t} label={t}/>)}</div>
              <div className="mono hide-mobile" style={{color:"#64748b",fontSize:11}}>A:${s.alert}</div>
              <div className="mono hide-mobile" style={{color:"#ef4444",fontSize:11}}>S:${s.stop}</div>
              <div className="mono hide-mobile" style={{color:"#22c55e",fontSize:11}}>2R:${s.t2r}</div>
              <div className="mono hide-mobile" style={{color:"#10b981",fontSize:11}}>5R:${s.t5r}</div>
              <div className="mono hide-mobile" style={{color:"#94a3b8",fontSize:11}}>{s.shares}sh</div>
            </div>
          ))}
        </>
      )}
    </div>
  )}

  {/* Sectors Tab */}
  {tab==="sectors" && (
    <div style={{paddingTop:8}}>
      {sectors.length===0?(
        <div style={{textAlign:"center",padding:60,color:"#4a6080"}}>
          <div style={{fontSize:40,marginBottom:12}}>🔥</div>
          <div style={{fontSize:16,fontWeight:600}}>Run a scan to see sector rankings</div>
        </div>
      ):sectors.map(s=>{
        const c=s.status==="HOT"?"#22c55e":s.status==="WARM"?"#f59e0b":"#ef4444";
        return (
          <div key={s.name} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 20px",borderBottom:"1px solid #0d1117"}}>
            <div style={{width:130,fontSize:13,color:"#e2e8f0"}}>{s.name}</div>
            <div style={{flex:1,background:"#0d1117",borderRadius:4,height:6,overflow:"hidden"}}>
              <div style={{width:`${(s.score/4)*100}%`,background:c,height:"100%",borderRadius:4}}/>
            </div>
            <div className="mono" style={{width:36,color:"#64748b",fontSize:12,textAlign:"right"}}>{fmt(s.score,1)}</div>
            <div style={{width:44,textAlign:"center",fontSize:11,fontWeight:700,color:c,background:c+"22",borderRadius:4,padding:"2px 6px"}}>{s.status}</div>
          </div>
        );
      })}
    </div>
  )}

  {/* Sizer Tab */}
  {tab==="sizer" && (
    <div style={{padding:24,maxWidth:460}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>Position Size Calculator</div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {[["Entry Price ($)",entry,setEntry,"e.g. 75.50"],["Stop Price ($)",stopP,setStopP,"e.g. 72.00"]].map(([label,val,set,ph])=>(
          <div key={label}>
            <div style={{fontSize:11,color:"#4a6080",marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>{label}</div>
            <input type="number" value={val} onChange={e=>set(e.target.value)} placeholder={ph}/>
          </div>
        ))}
        <div>
          <div style={{fontSize:11,color:"#4a6080",marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Risk % (1–3%)</div>
          <input type="range" min={1} max={3} step={0.5} value={riskPct} onChange={e=>setRiskPct(parseFloat(e.target.value))}/>
          <div className="mono" style={{fontSize:13,color:"#3b82f6",marginTop:4}}>{riskPct}% = ${fmt(riskD)} risk</div>
        </div>
      </div>
      {entryN>0&&stopN>0&&sd>0&&(
        <div style={{marginTop:24,background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:12,padding:20}}>
          {[
            ["Shares to Buy",capped,"#3b82f6"],
            ["Position Cost",`$${fmt(capped*entryN)}`,"#f59e0b"],
            ["Stop Distance",`$${fmt(sd)} (${fmt(sd/entryN*100)}%)`,"#ef4444"],
            ["2R Target",`$${fmt(entryN+sd*2)}`,"#22c55e"],
            ["5R Target",`$${fmt(entryN+sd*5)}`,"#10b981"],
            ["Max Risk",`$${fmt(riskD)}`,"#8b5cf6"],
          ].map(([label,val,color])=>(
            <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,color:"#64748b"}}>{label}</div>
              <div className="mono" style={{fontSize:16,fontWeight:700,color}}>{val}</div>
            </div>
          ))}
          {cost>cap&&<div style={{fontSize:12,color:"#f97316",background:"#f9730322",padding:"8px 12px",borderRadius:6}}>Position capped at 30% of account (${fmt(cap)})</div>}
        </div>
      )}
    </div>
  )}

  {/* Footer */}
  <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0d1117",borderTop:"1px solid #1e2a3a",padding:"8px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <div style={{fontSize:11,color:"#4a6080"}}>
      {scanning?`Scanning ${progress.cur}/${progress.tot} — ${progress.ticker}`:signals.length>0?`${signals.length} signals · ${sectors.filter(s=>s.status==="HOT").length} hot sectors`:"Ready — click Full Daily Scan"}
    </div>
    <div style={{fontSize:11,color:"#1e2a3a"}}>Iain's System v1.0</div>
  </div>
</div>

);
}

</script>
